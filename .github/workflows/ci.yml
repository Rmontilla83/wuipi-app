name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  # Stub secrets so type-check and build don't fail on missing env vars
  NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
  NEXT_PUBLIC_APP_URL: "https://wuipi-app.vercel.app"

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit --skipLibCheck
      - run: npm run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical || true
